# Конфигурация Eclipse Mosquitto для разработки
# Используется в docker-compose.yaml

# Основной листенер — без аутентификации (только для dev)
listener 1883
allow_anonymous true

# WebSocket листенер (опционально, для ws_client)
listener 9001
protocol websockets
allow_anonymous true

# Логирование
log_dest stdout
log_type all

# Persistence
persistence true
persistence_location /mosquitto/data/
